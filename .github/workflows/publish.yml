name: Publish to npm (Trusted Publishing)

on:
  workflow_dispatch:
  push:
    tags:
      - auth-browser-v*
      - auth-server-v*

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (OIDC Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Publish @aardwin/auth-browser
        working-directory: sdk
        if: startsWith(github.ref_name, 'auth-browser-v')
        run: |
          bun install --frozen-lockfile
          npm publish --provenance --access public

      - name: Publish @aardwin/auth-server
        working-directory: server-sdk
        if: startsWith(github.ref_name, 'auth-server-v')
        run: |
          bun install --frozen-lockfile
          npm publish --provenance --access public
